<section id="contact" class="section-padding bg-alt">
    <div class="container">
        <div class="section-header">
            <span class="section-subtitle">Fale Conosco</span>
            <h2 class="section-title">Inicie sua <span class="gradient-text">Transformação Digital</span></h2>
            <p class="section-description">
                Estamos prontos para entender os desafios da sua instituição e desenhar a melhor arquitetura blockchain.
            </p>
        </div>

        <div class="contact-wrapper">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Como podemos te chamar?" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail Institucional</label>
                    <input type="email" id="email" placeholder="seuemail@instituicao.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensagem</label>
                    <textarea id="message" rows="5" placeholder="Conte-nos um pouco sobre sua necessidade..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Mensagem</button>
            </form>

            <div class="contact-info">
                <div class="info-item">
        
                </div>
                <div class="info-item">
                    <div class="info-icon">📧</div>
                    <div>
                        <h4>E-mail</h4>
                        <p>contato@tbblockchain.com.br</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">💼</div>
                    <div>
                        <h4>LinkedIn</h4>
                        <p>www.linkedin.com/in/joseantonioramosx</p>
                    </div>
                </div>
                
                <div class="contact-status">
                    <span class="status-dot"></span>
                    Disponível para novos projetos e parcerias.
                </div>
            </div>
        </div>
    </div>
</section>
